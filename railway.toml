[build]
builder = "nixpacks"

[deploy]
startCommand = "cd /app && if [ ! -f .env ]; then cp .env.example .env 2>/dev/null || printf 'APP_NAME=Laravel\nAPP_ENV=production\nAPP_DEBUG=false\nAPP_URL=https://${RAILWAY_PUBLIC_DOMAIN:-localhost}\n' > .env; fi && APP_ENV=production APP_DEBUG=false APP_URL=https://${RAILWAY_PUBLIC_DOMAIN:-localhost} php artisan key:generate --force && APP_ENV=production APP_DEBUG=false APP_URL=https://${RAILWAY_PUBLIC_DOMAIN:-localhost} php artisan migrate --force && APP_ENV=production APP_DEBUG=false APP_URL=https://${RAILWAY_PUBLIC_DOMAIN:-localhost} php artisan config:cache && APP_ENV=production APP_DEBUG=false APP_URL=https://${RAILWAY_PUBLIC_DOMAIN:-localhost} php artisan route:cache && php artisan serve --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
