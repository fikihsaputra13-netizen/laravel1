[build]
builder = "nixpacks"

[deploy]
startCommand = "cd /app && if [ ! -f .env ]; then cp .env.example .env 2>/dev/null || printf 'APP_NAME=Laravel\n' > .env; fi && if ! grep -q '^APP_ENV=' .env; then printf '\nAPP_ENV=production\nAPP_DEBUG=false\nAPP_URL=https://${RAILWAY_PUBLIC_DOMAIN:-localhost}\n' >> .env; fi && php artisan key:generate --force && php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan serve --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
