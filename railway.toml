[build]
builder = "nixpacks"

[deploy]
 startCommand = "if [ ! -f .env ]; then cp .env.example .env; fi && perl -pi -e \"s/^APP_ENV=.*/APP_ENV=production/; s/^APP_DEBUG=.*/APP_DEBUG=false/;\" .env && mkdir -p storage/logs storage/framework/views storage/framework/sessions bootstrap/cache || true && chmod -R 0777 storage bootstrap/cache || true && php artisan key:generate --force && php artisan migrate --force && php artisan view:clear && (php artisan storage:link || true) && php artisan serve --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
